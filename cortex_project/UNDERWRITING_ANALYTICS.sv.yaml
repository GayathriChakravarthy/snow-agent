verified_queries:
  - name: 0;1
    question: What is the total premium and policy count by product line?
    sql: SELECT p.PRODUCT_LINE, COUNT(*) AS policy_count, SUM(p.ANNUAL_PREMIUM) AS
      total_premium FROM raw_policies AS p GROUP BY p.PRODUCT_LINE
    verified_at: 1782822523
    verified_by: Semantic Model Generator
  - name: 1;1
    question: How are underwriting decisions distributed across risk classes?
    sql: SELECT ud.RISK_CLASS, COUNT(*) AS decision_count, AVG(ud.RISK_SCORE) AS avg_risk_score
      FROM raw_underwriting_decisions AS ud GROUP BY ud.RISK_CLASS ORDER BY avg_risk_score
    verified_at: 1782822523
    verified_by: Semantic Model Generator
  - name: 2;1
    question: What is the claims summary by status?
    sql: SELECT c.CLAIM_STATUS, COUNT(*) AS claim_count, SUM(c.CLAIM_AMOUNT) AS total_claimed,
      SUM(c.APPROVED_AMOUNT) AS total_approved FROM raw_claims AS c GROUP BY c.CLAIM_STATUS
    verified_at: 1782822523
    verified_by: Semantic Model Generator
  - name: 3;1
    question: What is the premium collection performance by payment status?
    sql: SELECT pr.PAYMENT_STATUS, COUNT(*) AS payment_count, SUM(pr.AMOUNT_DUE) AS
      total_due, SUM(pr.AMOUNT_PAID) AS total_paid FROM raw_premiums AS pr GROUP BY
      pr.PAYMENT_STATUS
    verified_at: 1782822523
    verified_by: Semantic Model Generator
  - name: 4;1
    question: How are policyholders distributed by state and what is their average
      income?
    sql: SELECT ph.STATE_CODE, COUNT(DISTINCT ph.POLICYHOLDER_ID) AS policyholder_count,
      AVG(ph.ANNUAL_INCOME) AS avg_income FROM raw_policyholders AS ph GROUP BY ph.STATE_CODE
      ORDER BY policyholder_count DESC
    verified_at: 1782822523
    verified_by: Semantic Model Generator
